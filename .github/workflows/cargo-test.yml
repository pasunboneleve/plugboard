name: cargo-test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cargo-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        run: cargo test
